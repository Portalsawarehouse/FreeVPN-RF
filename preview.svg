  <text x="290" y="325" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
        fill="#86efac" text-anchor="middle">↑ ОТДАЧА</text>
  <text x="290" y="347" font-family="'Segoe UI', Arial, sans-serif" font-size="16"
        fill="white" text-anchor="middle" font-weight="700">12.1 Мбит/с</text>

  <!-- Disconnect button -->
