  <!-- Server list items -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="11.5">
    <!-- Active row -->
    <rect x="410" y="104" width="340" height="34" rx="6" fill="#166534"/>
    <text x="424" y="125" fill="#4ade80">● 🇩🇪 Германия #01     VLESS+Reality    38ms</text>

    <text x="424" y="159" fill="#86efac">○ 🇳🇱 Нидерланды #01  VLESS+Reality    44ms</text>
    <text x="424" y="183" fill="#86efac">○ 🇫🇮 Финляндия #01   Hysteria2        52ms</text>
    <text x="424" y="207" fill="#86efac">○ 🇫🇷 Франция #01     VLESS+Reality    61ms</text>
    <text x="424" y="231" fill="#86efac">○ 🇸🇪 Швеция #01      Shadowsocks      67ms</text>
    <text x="424" y="255" fill="#86efac">○ 🇦🇹 Австрия #01     Hysteria2        71ms</text>
    <text x="424" y="279" fill="#86efac">○ 🇺🇸 США, NY #01     VLESS+Reality    98ms</text>
    <text x="424" y="303" fill="#86efac">○ 🇯🇵 Япония #01      Hysteria2       143ms</text>
    <text x="424" y="321" fill="#6b7280">· · ·  и ещё 142 сервера  · · ·</text>
  </g>

  <!-- Protocol filter badges -->
  <rect x="412" y="338" width="96" height="22" rx="6" fill="#166534"/>
  <text x="460" y="353" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
