  <!-- Main card -->
  <rect x="40" y="66" width="340" height="398" fill="#166534" rx="12" filter="url(#sh2)" opacity="0.92"/>

  <!-- Shield big icon area -->
  <circle cx="210" cy="150" r="58" fill="#15803d" opacity="0.6"/>
  <path d="M210 100 L254 120 L254 148 C254 178 234 200 210 208 C186 200 166 178 166 148 L166 120 Z"
