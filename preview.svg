  <text x="210" y="286" font-family="'Courier New', monospace" font-size="10"
        fill="#6ee7b7" text-anchor="middle">IP: 185.XXX.XXX.XXX  Пинг: 38ms</text>

  <!-- Stats row -->
  <rect x="60" y="304" width="140" height="56" rx="8" fill="#15803d"/>
  <rect x="220" y="304" width="140" height="56" rx="8" fill="#15803d"/>
  <text x="130" y="325" font-family="'Segoe UI', Arial, sans-serif" font-size="10"
