  <rect x="0" y="30" width="800" height="14" fill="#14532d"/>
  <circle cx="24" cy="22" r="7" fill="#ef4444"/>
  <circle cx="46" cy="22" r="7" fill="#f59e0b"/>
  <circle cx="68" cy="22" r="7" fill="#22c55e"/>
  <text x="400" y="27" font-family="'Segoe UI', Arial, sans-serif" font-size="13"
